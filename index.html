<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#22263a;--border:#2e3350;
  --text:#e8eaf0;--muted:#7b82a0;--accent:#6c8fff;--accent-bg:#1a2240;
  --green:#4caf7d;--green-bg:#0d2a1a;--red:#f05c6e;--red-bg:#2a0d12;
  --orange:#f0a030;--orange-bg:#2a1a05;--purple:#a87fff;--purple-bg:#1e1030;
  --radius:10px;--radius-sm:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
a{color:inherit;text-decoration:none}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700;letter-spacing:-0.3px;color:var(--text)}
.logo em{color:var(--accent);font-style:normal}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.member-pill{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 12px}
.member-pill label{font-size:12px;color:var(--muted)}
.member-pill select{background:none;border:none;color:var(--text);font-size:13px;font-weight:500;cursor:pointer;outline:none}
.member-pill select option{background:var(--card)}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:12px 16px;font-size:13px;font-weight:500;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:7px;transition:all 0.15s}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-btn .count{font-size:11px;background:var(--accent-bg);color:var(--accent);padding:1px 7px;border-radius:10px;font-weight:600}
.nav-btn.active .count{background:var(--accent);color:#fff}

/* LAYOUT */
.content{padding:20px;max-width:1100px;margin:0 auto}
.view{display:none}
.view.active{display:block}

/* SECTION HEADER */
.section-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.section-title .icon{width:28px;height:28px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:15px}
.add-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;transition:opacity 0.15s}
.add-btn:hover{opacity:0.85}

/* FILTERS */
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s}
.chip:hover{border-color:var(--accent);color:var(--text)}
.chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-num{font-size:26px;font-weight:700;margin-bottom:3px}
.stat-label{font-size:12px;color:var(--muted)}
.stat.red .stat-num{color:var(--red)}
.stat.green .stat-num{color:var(--green)}
.stat.orange .stat-num{color:var(--orange)}
.stat.blue .stat-num{color:var(--accent)}

/* TASK CARDS */
.tasks{display:flex;flex-direction:column;gap:6px}
.task{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;display:flex;gap:12px;align-items:flex-start;transition:border-color 0.15s;cursor:pointer}
.task:hover{border-color:var(--accent)}
.task.done{opacity:0.4}
.task-cb{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.task-cb.checked{background:var(--green);border-color:var(--green)}
.task-cb.checked::after{content:'✓';color:#fff;font-size:10px;font-weight:700}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:500;margin-bottom:5px;color:var(--text)}
.task.done .task-title{text-decoration:line-through;color:var(--muted)}
.task-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:var(--radius-sm)}
.tag-urgent{background:var(--red-bg);color:var(--red)}
.tag-week{background:var(--orange-bg);color:var(--orange)}
.tag-ok{background:var(--green-bg);color:var(--green)}
.tag-type{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.tag-member{background:var(--purple-bg);color:var(--purple)}
.tag-accent{background:var(--accent-bg);color:var(--accent)}
.task-notes{font-size:12px;color:var(--muted);margin-top:5px;font-style:italic}
.task-date{font-size:11px;color:var(--muted)}

/* SAV */
.sav-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;margin-bottom:6px}
.sav-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.sav-client{font-weight:600;font-size:14px}
.sav-cmd{font-size:12px;color:var(--muted);background:var(--surface);padding:2px 8px;border-radius:var(--radius-sm)}
.sav-problem{font-size:13px;color:var(--text);margin-bottom:8px;line-height:1.5}
.sav-footer{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sav-notes{font-size:12px;color:var(--muted);font-style:italic}

/* CLIENTS */
.client-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;display:flex;gap:12px;align-items:flex-start;margin-bottom:6px;transition:border-color 0.15s}
.client-card:hover{border-color:var(--accent)}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--purple-bg);border:1px solid var(--purple);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--purple);flex-shrink:0}
.client-info{flex:1;min-width:0}
.client-name{font-size:14px;font-weight:600;margin-bottom:3px}
.client-demand{font-size:13px;color:var(--muted);margin-bottom:6px}
.client-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.client-email{font-size:11px;color:var(--muted)}

/* RESSOURCES */
.res-section{margin-bottom:20px}
.res-section-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 15px;margin-bottom:6px}
.res-name{font-size:14px;font-weight:500;margin-bottom:3px}
.res-link{font-size:12px;color:var(--accent);word-break:break-all;margin-bottom:3px}
.res-notes{font-size:12px;color:var(--muted);font-style:italic}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:500px}
.modal-title{font-size:16px;font-weight:600;margin-bottom:18px}
.form-group{margin-bottom:12px}
.form-group label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;padding:8px 11px;outline:none;transition:border-color 0.15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group select option{background:var(--card)}
.form-group textarea{resize:vertical;min-height:70px;font-family:inherit}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.btn-cancel{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-size:13px}
.btn-cancel:hover{color:var(--text)}
.btn-save{padding:8px 18px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.btn-save:hover{opacity:0.85}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
.empty-icon{font-size:32px;margin-bottom:8px}

/* SECTION DIVIDER */
.section-divider{margin:20px 0 14px;font-size:13px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:8px}
.section-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

let data=loadData();

function showView(v,btn){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  btn.classList.add('active');
  renderAll();
}

function filterByMember(){currentMember=document.getElementById('memberFilter').value;renderAll();}

function setFilter(type,val,btn){
  filters[type]=val;
  btn.closest('.filters').querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  if(type==='task')renderTasks();
  else if(type==='sav')renderSav();
  else if(type==='client')renderClients();
  else if(type==='site')renderSite();
}

function myTasks(){return data.tasks.filter(t=>currentMember==='all'||t.assignee===currentMember);}

function priorityOrder(p){return p==='🔴 Urgent'?0:p==='🟠 Cette semaine'?1:2;}

function taskHTML(t){
  const pTag=t.priority==='🔴 Urgent'?'<span class="tag tag-urgent">Urgent</span>':t.priority==='🟠 Cette semaine'?'<span class="tag tag-week">Cette semaine</span>':'<span class="tag tag-ok">Pas urgent</span>';
  const mem=currentMember==='all'?`<span class="tag tag-member">${t.assignee}</span>`:'';
  return`<div class="task${t.done?' done':''}" onclick="toggleDone(${t.id})">
    <div class="task-cb${t.done?' checked':''}"></div>
    <div class="task-body">
      <div class="task-title">${t.title}</div>
      <div class="task-meta">${pTag}<span class="tag tag-type">${t.type}</span><span class="tag tag-accent">${t.univers}</span>${mem}${t.date?`<span class="task-date">${t.date}</span>`:''}</div>
      ${t.notes?`<div class="task-notes">${t.notes}</div>`:''}
    </div>
  </div>`;
}

function toggleDone(id){
  const t=data.tasks.find(x=>x.id===id);
  if(t){t.done=!t.done;if(t.done)t.status='Terminé';saveData();}
  renderAll();
}

function renderDashboard(){
  const tasks=myTasks();
  const urg=tasks.filter(t=>t.priority==='🔴 Urgent'&&!t.done);
  const week=tasks.filter(t=>t.priority==='🟠 Cette semaine'&&!t.done);
  const active=tasks.filter(t=>!t.done);
  const savOpen=data.sav.filter(s=>s.status!=='Resolu');
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat blue"><div class="stat-num">${active.length}</div><div class="stat-label">Tâches actives</div></div>
    <div class="stat red"><div class="stat-num">${urg.length}</div><div class="stat-label">Urgences</div></div>
    <div class="stat orange"><div class="stat-num">${week.length}</div><div class="stat-label">Cette semaine</div></div>
    <div class="stat red"><div class="stat-num">${savOpen.length}</div><div class="stat-label">SAV ouverts</div></div>
  `;
  document.getElementById('urgList').innerHTML=urg.length?urg.map(taskHTML).join(''):'<div class="empty"><div class="empty-icon">✅</div>Aucune urgence</div>';
  document.getElementById('weekList').innerHTML=week.length?week.slice(0,5).map(taskHTML).join(''):'<div class="empty">Aucune tâche cette semaine</div>';
  const sc={'En cours':'tag-urgent','En attente retour client':'tag-week','En attente retour fournisseur':'tag-week','Resolu':'tag-ok'};
  document.getElementById('savDash').innerHTML=savOpen.length?savOpen.slice(0,4).map(s=>`<div class="sav-card"><div class="sav-header"><div class="sav-client">${s.client}</div>${s.commande?`<div class="sav-cmd">#${s.commande}</div>`:''}</div><div class="sav-problem">${s.problem}</div><div class="sav-footer"><span class="tag ${sc[s.status]||'tag-type'}">${s.status}</span><span class="task-date">${s.date}</span></div></div>`).join(''):'<div class="empty">Aucun SAV ouvert</div>';
  document.getElementById('cnt-taches').textContent=active.length;
  document.getElementById('cnt-sav').textContent=savOpen.length;
}

function renderTasks(){
  let tasks=myTasks();
  const f=filters.task;
  if(f==='urgent')tasks=tasks.filter(t=>t.priority==='🔴 Urgent'&&!t.done);
  else if(f==='done')tasks=tasks.filter(t=>t.done);
  else if(f==='all')tasks=tasks.filter(t=>!t.done);
  else if(f==='Fiche produit')tasks=tasks.filter(t=>t.type==='Fiche produit'&&!t.done);
  else if(f==='Video')tasks=tasks.filter(t=>t.type==='Vidéo'&&!t.done);
  else if(f==='Newsletter')tasks=tasks.filter(t=>t.type==='Newsletter'&&!t.done);
  else tasks=tasks.filter(t=>t.status===f&&!t.done);
  tasks.sort((a,b)=>priorityOrder(a.priority)-priorityOrder(b.priority));
  document.getElementById('tasksList').innerHTML=tasks.length?tasks.map(taskHTML).join(''):'<div class="empty"><div class="empty-icon">🎉</div>Aucune tâche ici</div>';
}

function renderSav(){
  let list=data.sav;
  const f=filters.sav;
  if(f==='En cours')list=list.filter(s=>s.status==='En cours');
  else if(f==='En attente')list=list.filter(s=>s.status.includes('attente'));
  else if(f==='Resolu')list=list.filter(s=>s.status==='Resolu');
  const sc={'En cours':'tag-urgent','En attente retour client':'tag-week','En attente retour fournisseur':'tag-week','Resolu':'tag-ok'};
  document.getElementById('savList').innerHTML=list.length?list.map(s=>`<div class="sav-card"><div class="sav-header"><div class="sav-client">${s.client}</div>${s.commande?`<div class="sav-cmd">#${s.commande}</div>`:''}</div><div class="sav-problem">${s.problem}</div><div class="sav-footer"><span class="tag ${sc[s.status]||'tag-type'}">${s.status}</span><span class="task-date">${s.date}</span>${s.notes?`<span class="sav-notes">${s.notes}</span>`:''}</div></div>`).join(''):'<div class="empty">Aucun SAV</div>';
}

function renderClients(){
  let list=data.clients;
  const f=filters.client;
  if(f!=='all')list=list.filter(c=>c.status===f);
  const sc={'A relancer':'tag-urgent','Prioritaire':'tag-urgent','VIP':'tag-week','Prospect':'tag-accent','Client actif':'tag-ok','Inactif':'tag-type'};
  const ini=c=>((c.prenom||'').charAt(0)+(c.nom||'').charAt(0)).toUpperCase();
  document.getElementById('clientsList').innerHTML=list.length?list.map(c=>`<div class="client-card"><div class="avatar">${ini(c)}</div><div class="client-info"><div class="client-name">${c.prenom?c.prenom+' ':''}${c.nom}</div><div class="client-demand">${c.demand}</div><div class="client-meta"><span class="tag ${sc[c.status]||'tag-type'}">${c.status}</span>${c.email?`<span class="client-email">${c.email}</span>`:''}</div></div></div>`).join(''):'<div class="empty">Aucun client</div>';
}

function renderSite(){
  let list=data.site;
  const f=filters.site;
  if(f!=='all')list=list.filter(s=>s.type===f);
  const sc={'En cours':'tag-week','A traiter':'tag-type','Terminé':'tag-ok'};
  document.getElementById('siteList').innerHTML=list.length?list.map(s=>`<div class="task"><div class="task-body"><div class="task-title">${s.task}</div><div class="task-meta"><span class="tag ${sc[s.status]||'tag-type'}">${s.status}</span><span class="tag tag-type">${s.type}</span><span class="tag tag-accent">${s.site}</span>${s.deadline?`<span class="task-date">📅 ${s.deadline}</span>`:''}</div></div></div>`).join(''):'<div class="empty">Aucune tâche technique</div>';
}

function renderRessources(){
  const cats=[...new Set(data.ressources.map(r=>r.cat))];
  document.getElementById('resList').innerHTML=cats.map(cat=>`<div class="res-section"><div class="res-section-title">${cat}</div>${data.ressources.filter(r=>r.cat===cat).map(r=>`<div class="res-card"><div class="res-name">${r.nom}</div><div class="res-link">${r.lien}</div>${r.notes?`<div class="res-notes">${r.notes}</div>`:''}</div>`).join('')}</div>`).join('');
}

function renderAll(){renderDashboard();renderTasks();renderSav();renderClients();renderSite();renderRessources();}

const FORM_TITLES={tache:'Nouvelle tâche',sav:'Nouveau SAV client',client:'Nouveau client / prospect',site:'Nouvelle tâche technique',ressource:'Nouvelle ressource'};

function openForm(type){
  currentForm=type;
  document.getElementById('modalTitle').textContent=FORM_TITLES[type];
  document.getElementById('modalBody').innerHTML=FORMS[type];
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}
document.getElementById('modalBg').addEventListener('click',function(e){if(e.target===this)closeModal();});

function g(id){const el=document.getElementById(id);return el?el.value.trim():'';}

function saveForm(){
  const id=Date.now();
  if(currentForm==='tache'){
    if(!g('f_title'))return alert('Le titre est obligatoire');
    data.tasks.unshift({id,title:g('f_title'),assignee:g('f_assignee'),type:g('f_type'),univers:g('f_univers'),priority:g('f_priority'),status:g('f_status'),date:g('f_date')||new Date().toLocaleDateString('fr-FR'),link:g('f_link'),notes:g('f_notes'),done:false});
  }else if(currentForm==='sav'){
    if(!g('f_client'))return alert('Le nom client est obligatoire');
    data.sav.unshift({id,client:g('f_client'),commande:g('f_cmd'),problem:g('f_problem'),status:g('f_status'),date:new Date().toLocaleDateString('fr-FR'),notes:g('f_notes')});
  }else if(currentForm==='client'){
    if(!g('f_nom'))return alert('Le nom est obligatoire');
    data.clients.unshift({id,nom:g('f_nom'),prenom:g('f_prenom'),email:g('f_email'),tel:g('f_tel'),demand:g('f_demand'),status:g('f_status'),priority:g('f_priority'),notes:g('f_notes')});
  }else if(currentForm==='site'){
    if(!g('f_task'))return alert('La description est obligatoire');
    data.site.unshift({id,task:g('f_task'),type:g('f_type'),site:g('f_site'),status:g('f_status'),deadline:g('f_deadline')});
  }else if(currentForm==='ressource'){
    if(!g('f_nom'))return alert('Le nom est obligatoire');
    data.ressources.unshift({id,cat:g('f_cat'),nom:g('f_nom'),lien:g('f_lien'),notes:g('f_notes')});
  }
  saveData();closeModal();renderAll();
}
